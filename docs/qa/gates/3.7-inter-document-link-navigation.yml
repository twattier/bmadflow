fix_summary:
  files_modified:
    backend:
      - file: 'apps/api/src/routes/projects.py'
        change: 'Added GET /api/projects/{project_id} endpoint to fetch project by ID'
        lines_added: 24

    frontend:
      - file: 'apps/web/src/services/projectsService.ts'
        change: 'Added getProject(projectId) service function'
        lines_added: 5

      - file: 'apps/web/src/hooks/useProjects.ts'
        change: 'Added useProjectById(projectId) React Query hook with 5-min cache'
        lines_added: 8

      - file: 'apps/web/src/pages/DetailView.tsx'
        change: 'Added automatic project loading when document is fetched. Fetches project by document.project_id and sets in context'
        lines_added: 12

  solution_approach: |
    When user navigates directly to /detail/:documentId (bookmark, shared link, refresh):
    1. DetailView fetches document (already existing behavior)
    2. Extract project_id from document
    3. If currentProject not set, fetch project using new useProjectById hook
    4. Set project in context via useEffect
    5. DocumentLink components now have project context and can resolve internal .md links

    This approach avoids redundant fetches (only fetches when currentProject is null) and
    leverages React Query caching (5-min stale time).

